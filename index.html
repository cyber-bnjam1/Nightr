<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Nightr"/>
  <meta name="theme-color" content="#07070f"/>
  <title>Nightr</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="nightr.css"/>
</head>
<body>

<div class="bg-orbs" aria-hidden="true">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
</div>

<!-- HEADER -->
<header class="hdr glass-hdr" id="hdr">
  <div class="hdr-inner">
    <button class="icon-btn glass-btn" id="burgerBtn">
      <span class="bl"></span><span class="bl"></span><span class="bl"></span>
    </button>
    <h1 class="logo">Nightr</h1>
    <button class="icon-btn glass-btn" id="addBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
</header>

<!-- MENU OVERLAY -->
<div class="menu-overlay" id="menuOverlay"></div>

<!-- MENU PANEL -->
<nav class="menu-panel glass-panel" id="menuPanel">
  <div class="menu-hdr">
    <span class="menu-logo">🌙 Nightr</span>
    <button class="icon-btn glass-btn" id="closeMenuBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="event-chip glass-card" id="eventChip">
    <span class="chip-label">Soirée active</span>
    <span class="chip-val" id="activeEventName">Aucune soirée</span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <ul class="nav-list">
    <li><button class="nav-btn active" data-view="dashboard"><span class="nav-icon">✦</span><span>Dashboard</span></button></li>
    <li><button class="nav-btn" data-view="guests"><span class="nav-icon">👥</span><span>Invités & RSVP</span><span class="badge" id="badgeGuests"></span></button></li>
    <li><button class="nav-btn" data-view="invitations"><span class="nav-icon">📩</span><span>Invitations & QR</span></button></li>
    <li><button class="nav-btn" data-view="contributions"><span class="nav-icon">🛒</span><span>Contributions</span></button></li>
    <li><button class="nav-btn" data-view="budget"><span class="nav-icon">💰</span><span>Budget & Stats</span></button></li>
    <li><button class="nav-btn" data-view="checklist"><span class="nav-icon">✅</span><span>Checklist</span><span class="badge" id="badgeChecklist"></span></button></li>
    <li><button class="nav-btn" data-view="vibes"><span class="nav-icon">🎵</span><span>Ambiance</span></button></li>
  </ul>
  <div class="menu-footer">
    <div class="user-chip glass-card" id="userChip">
      <div class="user-av" id="userAv">?</div>
      <div><div class="user-name" id="userName">Non connecté</div><div class="user-email" id="userEmail">—</div></div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="main" id="main">
  <div class="view" id="view">
    <div class="loading"><div class="spin"></div><p>Chargement…</p></div>
  </div>
</main>

<!-- TOASTS -->
<div id="toasts"></div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg"></div>
<div class="modal-wrap" id="modalWrap"></div>

<!-- Firebase (compat SDK = pas de modules ES, fonctionne partout) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- QR Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- App -->
<script src="nightr.js"></script>

</body>
</html>
