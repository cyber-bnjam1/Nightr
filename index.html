<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Nightr"/>
  <meta name="theme-color" content="#07070f"/>
  <title>Nightr</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="nightr.png"/>
<style>
/* ===== NIGHTR CSS ===== */
:root {
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 34px);
  --bg: #07070f;
  --bg2: #0f0f1e;
  --ac: #a855f7;
  --ac2: #ec4899;
  --glass: rgba(255,255,255,0.07);
  --glassb: rgba(255,255,255,0.12);
  --muted: rgba(240,240,255,0.5);
  --hh: calc(56px + var(--safe-top));
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; width:100%; overflow:hidden; background:var(--bg); color:#f0f0ff;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif; -webkit-font-smoothing:antialiased; }

/* APP */
#app { position:fixed; inset:0; display:flex; flex-direction:column; }

/* HEADER */
#header { position:fixed; top:0; left:0; right:0; z-index:100; height:var(–hh);
padding-top:var(–safe-top); padding-left:16px; padding-right:16px;
display:flex; align-items:center; justify-content:space-between;
background:rgba(7,7,15,0.85); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
border-bottom:1px solid var(–glassb); }
#burger { background:none; border:none; width:40px; height:40px; cursor:pointer;
display:flex; flex-direction:column; justify-content:center; align-items:center; gap:5px; flex-shrink:0; }
#burger span { display:block; width:22px; height:2px; border-radius:2px; background:#f0f0ff; transition:all .3s; }
#burger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
#burger.open span:nth-child(2) { opacity:0; }
#burger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
#page-title { font-size:20px; font-weight:700; letter-spacing:-.5px;
background:linear-gradient(90deg,#fff,var(–ac)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
#avatar { width:34px; height:34px; border-radius:50%; background:var(–glass); border:1.5px solid var(–glassb);
display:flex; align-items:center; justify-content:center; font-size:16px; overflow:hidden; cursor:pointer; flex-shrink:0; }
#avatar img { width:100%; height:100%; object-fit:cover; }

/* OVERLAY + MENU */
#overlay { position:fixed; inset:0; z-index:150; background:rgba(0,0,0,.5); backdrop-filter:blur(4px);
opacity:0; pointer-events:none; transition:opacity .3s; }
#overlay.show { opacity:1; pointer-events:all; }
#sidemenu { position:fixed; top:0; left:0; bottom:0; z-index:200; width:280px;
padding-top:calc(var(–safe-top) + 60px); padding-bottom:calc(var(–safe-bot) + 20px);
padding-left:16px; padding-right:16px;
background:rgba(10,10,20,.97); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px);
border-right:1px solid var(–glassb); transform:translateX(-100%);
transition:transform .35s cubic-bezier(.4,0,.2,1); overflow-y:auto; }
#sidemenu.open { transform:translateX(0); }
#menu-user { display:flex; align-items:center; gap:12px; padding:14px;
background:var(–glass); border-radius:16px; border:1px solid var(–glassb); margin-bottom:12px; }
#menu-avatar-big { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(–ac),var(–ac2));
display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; overflow:hidden; }
#menu-avatar-big img { width:100%; height:100%; object-fit:cover; }
#menu-name { font-size:15px; font-weight:600; }
#menu-email { font-size:12px; color:var(–muted); }
#sidemenu ul { list-style:none; display:flex; flex-direction:column; gap:3px; }
#sidemenu li { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px;
font-size:15px; font-weight:500; cursor:pointer; color:var(–muted); border:1px solid transparent; transition:all .2s; }
#sidemenu li span { font-size:19px; }
#sidemenu li.active { background:linear-gradient(135deg,rgba(168,85,247,.2),rgba(236,72,153,.1));
border-color:rgba(168,85,247,.3); color:#fff; }
#sidemenu li:active { background:var(–glass); }

/* MAIN */
main#main { flex:1; padding-top:var(–hh); padding-bottom:var(–safe-bot); overflow-y:auto; -webkit-overflow-scrolling:touch; }
.page { display:none; padding:20px 16px; min-height:100%; }
.page.active { display:block; }

/* MODAL */
#modal-overlay { position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.7); backdrop-filter:blur(8px);
display:none; align-items:flex-end; justify-content:center; }
#modal-overlay.show { display:flex; }
#modal-box { background:#0f0f1e; border:1px solid var(–glassb); border-radius:28px 28px 0 0;
width:100%; max-height:90vh; padding:16px 20px calc(var(–safe-bot) + 20px); overflow-y:auto;
animation:slideUp .3s cubic-bezier(.4,0,.2,1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.mtitle { font-size:20px; font-weight:700; margin-bottom:20px; }

/* TOAST */
#toast { position:fixed; bottom:calc(var(–safe-bot) + 90px); left:50%;
transform:translateX(-50%) translateY(16px); background:rgba(30,30,50,.95);
border:1px solid var(–glassb); backdrop-filter:blur(20px); border-radius:50px;
padding:12px 24px; font-size:14px; font-weight:600; opacity:0; transition:all .3s;
pointer-events:none; z-index:500; white-space:nowrap; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:8px;
padding:12px 20px; border-radius:50px; font-size:15px; font-weight:600;
cursor:pointer; border:none; transition:all .2s; font-family:inherit; }
.btn:active { transform:scale(.95); }
.btn-p { background:linear-gradient(135deg,var(–ac),var(–ac2)); color:#fff; box-shadow:0 4px 20px rgba(168,85,247,.4); }
.btn-s { background:var(–glass); border:1px solid var(–glassb); color:#f0f0ff; backdrop-filter:blur(10px); }
.btn-d { background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.3); color:#f87171; }
.btn-sm { padding:7px 13px; font-size:13px; }
.w100 { width:100%; }

/* FAB */
.fab { position:fixed; bottom:calc(var(–safe-bot) + 24px); right:20px;
width:58px; height:58px; border-radius:50%; background:linear-gradient(135deg,var(–ac),var(–ac2));
border:none; cursor:pointer; font-size:28px; color:#fff; box-shadow:0 8px 32px rgba(168,85,247,.5);
z-index:80; display:flex; align-items:center; justify-content:center; }
.fab:active { transform:scale(.9); }

/* FORM */
.fld { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.lbl { font-size:12px; font-weight:700; color:var(–muted); text-transform:uppercase; letter-spacing:.5px; }
.inp { width:100%; background:var(–glass); border:1px solid var(–glassb); border-radius:12px;
color:#f0f0ff; font-size:15px; padding:13px 14px; outline:none; -webkit-appearance:none;
font-family:inherit; transition:border-color .2s; }
.inp:focus { border-color:var(–ac); }
select.inp option { background:#1a1a2e; color:#f0f0ff; }
.ta { resize:vertical; min-height:80px; }

/* COLOR PICKER */
.cpick { display:flex; gap:8px; flex-wrap:wrap; }
.swatch { width:30px; height:30px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:border-color .2s; }

/* CARDS */
.card { background:var(–glass); border:1px solid var(–glassb); border-radius:16px; padding:16px; margin-bottom:12px; }
.ptitle { font-size:22px; font-weight:700; margin-bottom:16px; }
.slbl { font-size:12px; font-weight:700; color:var(–muted); text-transform:uppercase; letter-spacing:.8px; margin:0 4px 8px; }
.sep { height:1px; background:var(–glassb); margin:14px 0; }
.spacer { height:90px; }

/* EVENT CARDS */
.ev-card { position:relative; border-radius:20px; overflow:hidden; margin-bottom:12px;
border:1px solid var(–glassb); cursor:pointer; padding:18px; background:var(–glass); transition:transform .2s; }
.ev-card:active { transform:scale(.98); }
.ev-name { font-size:22px; font-weight:700; margin-bottom:4px; }
.ev-meta { font-size:13px; color:var(–muted); display:flex; gap:12px; flex-wrap:wrap; }
.ev-cd { margin-top:10px; padding:8px 12px; background:rgba(0,0,0,.3); border-radius:10px;
font-size:13px; font-weight:600; color:var(–ac); display:inline-block; }
.status { display:inline-flex; padding:4px 12px; border-radius:50px; font-size:11px; font-weight:700;
text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.s-draft { background:rgba(156,163,175,.2); color:#9ca3af; }
.s-ok { background:rgba(34,197,94,.2); color:#4ade80; }
.s-live { background:rgba(168,85,247,.2); color:#c084fc; }
.s-done { background:rgba(107,114,128,.2); color:#6b7280; }

/* LIST ROWS */
.g-row { display:flex; align-items:center; gap:12px; padding:12px 14px;
background:var(–glass); border:1px solid var(–glassb); border-radius:12px; margin-bottom:8px; }
.av { width:44px; height:44px; border-radius:50%;
background:linear-gradient(135deg,var(–ac),var(–ac2));
display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; flex-shrink:0; color:#fff; }
.rinfo { flex:1; }
.rn { font-size:15px; font-weight:600; }
.rs { font-size:13px; color:var(–muted); }

/* BADGES */
.badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:50px; font-size:12px; font-weight:600; }
.b-yes { background:rgba(34,197,94,.15); color:#4ade80; border:1px solid rgba(34,197,94,.3); }
.b-no  { background:rgba(239,68,68,.15); color:#f87171; border:1px solid rgba(239,68,68,.3); }
.b-wait{ background:rgba(234,179,8,.15); color:#fbbf24; border:1px solid rgba(234,179,8,.3); }
.b-vip { background:rgba(168,85,247,.2); color:#c084fc; border:1px solid rgba(168,85,247,.4); }
.b-acc { background:rgba(168,85,247,.15); color:var(–ac); border:1px solid rgba(168,85,247,.3); }

/* STATS */
.stat2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.stat3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:16px; }
.sc { background:var(–glass); border:1px solid var(–glassb); border-radius:16px; padding:16px; }
.sv { font-size:28px; font-weight:800; }
.sl { font-size:12px; color:var(–muted); font-weight:500; margin-top:2px; }
.green { color:#4ade80; } .red { color:#f87171; } .yellow { color:#fbbf24; }
.ac { background:linear-gradient(135deg,var(–ac),var(–ac2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.ac2 { color:var(–ac2); }

/* PROGRESS */
.pbar { width:100%; height:8px; border-radius:4px; background:rgba(255,255,255,.1); overflow:hidden; }
.pfill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(–ac),var(–ac2)); transition:width .6s; }
.pbar-stack { display:flex; height:20px; border-radius:10px; overflow:hidden; }

/* CHECKLIST */
.cbox { width:24px; height:24px; border-radius:8px; flex-shrink:0; border:2px solid var(–glassb);
cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; font-size:13px; font-weight:700; }
.cbox.checked { background:var(–ac); border-color:var(–ac); color:#fff; }
.chkrow { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(–glassb); }
.chkrow:last-of-type { border-bottom:none; }
.done { text-decoration:line-through; opacity:.5; }

/* TABS */
.tabs { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; }
.tab-btn { background:var(–glass); border:1px solid var(–glassb); border-radius:50px;
color:var(–muted); font-size:18px; padding:8px 16px; cursor:pointer; white-space:nowrap; transition:all .2s; font-family:inherit; }
.tab-btn.active { background:linear-gradient(135deg,var(–ac),var(–ac2)); border-color:transparent; color:#fff; }

/* TIMELINE */
.timeline { position:relative; padding-left:24px; }
.timeline::before { content:’’; position:absolute; left:10px; top:0; bottom:0; width:2px;
background:linear-gradient(180deg,var(–ac),var(–ac2)); }
.tl-item { position:relative; margin-bottom:14px; }
.tl-dot { position:absolute; left:-19px; top:6px; width:12px; height:12px; border-radius:50%;
background:var(–ac); border:2px solid var(–bg); }

/* INVITATION PREVIEW */
.inv-preview { background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(236,72,153,.1));
border:1px solid rgba(168,85,247,.3); border-radius:20px; padding:20px; line-height:1.8;
font-size:14px; margin-bottom:16px; }

/* EMOJI PICK */
.emoji-pick { font-size:24px; background:var(–glass); border:1px solid var(–glassb);
border-radius:10px; padding:8px; cursor:pointer; transition:all .2s; }
.emoji-pick.active { background:rgba(168,85,247,.3); border-color:var(–ac); }

/* MISC */
.row-between { display:flex; justify-content:space-between; align-items:center; }
.row-info { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.desc { font-size:14px; color:var(–muted); margin-top:8px; }
.mbtns { display:flex; gap:10px; margin-top:16px; }
.loading { text-align:center; padding:40px; color:var(–muted); }
.empty { text-align:center; padding:60px 20px; }
.eico { font-size:60px; margin-bottom:12px; }
.etit { font-size:20px; font-weight:700; margin-bottom:6px; }
.esub { color:var(–muted); font-size:15px; }
</style>

</head>
<body>

<div id="app">
  <header id="header">
    <button id="burger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
    <span id="page-title">nightr</span>
    <div id="avatar" onclick="nav('settings')">🎉</div>
  </header>

  <div id="overlay" onclick="closeMenu()"></div>
  <nav id="sidemenu">
    <div id="menu-user">
      <div id="menu-avatar-big">🎉</div>
      <div>
        <div id="menu-name">Nightr</div>
        <div id="menu-email">Données locales</div>
      </div>
    </div>
    <ul>
      <li onclick="nav('events')"        class="active"><span>🎉</span>Événements</li>
      <li onclick="nav('guests')"                      ><span>👥</span>Invités</li>
      <li onclick="nav('invitations')"                 ><span>💌</span>Invitations</li>
      <li onclick="nav('contributions')"               ><span>🛒</span>Contributions</li>
      <li onclick="nav('budget')"                      ><span>💰</span>Budget</li>
      <li onclick="nav('stats')"                       ><span>📊</span>Statistiques</li>
      <li onclick="nav('ambiance')"                    ><span>🎵</span>Ambiance</li>

  <main id="main">
    <div id="page-events"        class="page active"></div>
    <div id="page-guests"        class="page"></div>
    <div id="page-invitations"   class="page"></div>
    <div id="page-contributions" class="page"></div>
    <div id="page-budget"        class="page"></div>
    <div id="page-stats"         class="page"></div>
    <div id="page-ambiance"      class="page"></div>
    <div id="page-settings"      class="page"></div>
  </main>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box"></div>
</div>
<div id="toast"></div>

<script>
// ===== db.js — persistence locale + Firebase =====
// Chargé en <script> classique, pas de modules

window.CURRENT_USER = null;

function lsKey(col){ return 'nightr_' + col; }

// GET
async function dbGet(col) {
  if (!window.CURRENT_USER || !window.FB_DB) {
    return JSON.parse(localStorage.getItem(lsKey(col)) || '[]');
  }
  const mod = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const snap = await mod.getDocs(mod.collection(window.FB_DB, 'users/' + window.CURRENT_USER.uid + '/' + col));
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

// SET
async function dbSet(col, id, data) {
  if (!window.CURRENT_USER || !window.FB_DB) {
    const all = JSON.parse(localStorage.getItem(lsKey(col)) || '[]');
    const i = all.findIndex(x => x.id === id);
    if (i >= 0) all[i] = data; else all.push(data);
    localStorage.setItem(lsKey(col), JSON.stringify(all));
    return;
  }
  const mod = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  await mod.setDoc(mod.doc(window.FB_DB, 'users/' + window.CURRENT_USER.uid + '/' + col, id), { ...data, _t: Date.now() });
}

// DELETE
async function dbDel(col, id) {
  if (!window.CURRENT_USER || !window.FB_DB) {
    const all = JSON.parse(localStorage.getItem(lsKey(col)) || '[]');
    localStorage.setItem(lsKey(col), JSON.stringify(all.filter(x => x.id !== id)));
    return;
  }
  const mod = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  await mod.deleteDoc(mod.doc(window.FB_DB, 'users/' + window.CURRENT_USER.uid + '/' + col, id));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}
</script>

<script>
// ===== app.js — logique complète Nightr =====
// Script classique, chargé après db.js

window.CURRENT_PAGE = 'events';

// ─── UTILS ───────────────────────────────────────────────────────────────────

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.getElementById('modal-box').innerHTML = '';
}

function fmtDate(d) {
  if (!d) return '';
  var dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}

function countdown(d) {
  if (!d) return null;
  var now = new Date(); now.setHours(0,0,0,0);
  var diff = Math.round((new Date(d + 'T00:00:00') - now) / 86400000);
  if (diff < 0)  return null;
  if (diff === 0) return "C'est aujourd'hui 🎊";
  if (diff === 1) return 'Demain !';
  return 'Dans ' + diff + ' jours';
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────

var PAGE_TITLES = {
  events:'Événements', guests:'Invités', invitations:'Invitations',
  contributions:'Contributions', budget:'Budget', stats:'Statistiques',
  ambiance:'Ambiance', settings:'Réglages'
};

function nav(page) {
  window.CURRENT_PAGE = page;
  // pages
  var pages = document.querySelectorAll('.page');
  for (var i=0; i<pages.length; i++) pages[i].classList.remove('active');
  document.getElementById('page-' + page).classList.add('active');
  // menu items
  var items = document.querySelectorAll('#sidemenu li');
  for (var j=0; j<items.length; j++) items[j].classList.remove('active');
  var match = document.querySelector('#sidemenu li[onclick*="\'' + page + '\'"]');
  if (match) match.classList.add('active');
  // title
  document.getElementById('page-title').textContent = PAGE_TITLES[page] || 'nightr';
  closeMenu();
  renderPage(page);
}

function renderPage(page) {
  var el = document.getElementById('page-' + page);
  if (!el) return;
  if (page === 'events')        renderEvents(el);
  else if (page === 'guests')   renderGuests(el);
  else if (page === 'invitations')   renderInvitations(el);
  else if (page === 'contributions') renderContributions(el);
  else if (page === 'budget')   renderBudget(el);
  else if (page === 'stats')    renderStats(el);
  else if (page === 'ambiance') renderAmbiance(el);
  else if (page === 'settings') renderSettings(el);
}

// ─── MENU ─────────────────────────────────────────────────────────────────────

function toggleMenu() {
  var menu = document.getElementById('sidemenu');
  if (menu.classList.contains('open')) closeMenu();
  else openMenuFn();
}

function openMenuFn() {
  document.getElementById('sidemenu').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  document.getElementById('burger').classList.add('open');
}

function closeMenu() {
  document.getElementById('sidemenu').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('burger').classList.remove('open');
}

// ─── USER UI ──────────────────────────────────────────────────────────────────

function updateUserUI() {
  var u = window.CURRENT_USER;
  var av = document.getElementById('avatar');
  var avBig = document.getElementById('menu-avatar-big');
  var name = document.getElementById('menu-name');
  var email = document.getElementById('menu-email');
  if (u) {
    av.innerHTML = u.photoURL ? '<img src="' + u.photoURL + '">' : (u.displayName||'U')[0];
    avBig.innerHTML = u.photoURL ? '<img src="' + u.photoURL + '">' : (u.displayName||'U')[0];
    name.textContent = u.displayName || 'Utilisateur';
    email.textContent = u.email || '';
  } else {
    av.textContent = '🎉';
    avBig.textContent = '🎉';
    name.textContent = 'Nightr';
    email.textContent = 'Données locales';
  }
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────

function renderEvents(el) {
  el.innerHTML = '<div class="loading">Chargement…</div>';
  dbGet('events').then(function(events) {

html += ‘<div class="row-between" style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)">’
+ ‘<div style="display:flex;gap:10px;align-items:center">’
+ ‘<span style="font-size:22px">’ + (z.emoji||‘📍’) + ‘</span>’
+ ‘<span style="font-weight:600">’ + z.name + ‘</span></div>’
+ ‘<div style="display:flex;align-items:center;gap:8px">’
+ (z.capacity?’<span class="badge b-acc">’+z.capacity+’ pers.</span>’:’’)
+ ‘<button class="btn btn-sm btn-d adel" data-id="' + z.id + '">🗑️</button></div></div>’;
});
if (!zones.length) html += ‘<div style="color:var(--muted);text-align:center;padding:16px">Aucune zone</div>’;
html += ‘</div><button class="btn btn-p w100" id="a-addzone" style="margin-top:16px">➕ Zone</button>’;
ac.innerHTML = html;

ac.querySelectorAll(’.adel’).forEach(function(btn) {
btn.addEventListener(‘click’, function(){ dbDel(‘ambiance’, btn.dataset.id).then(function(){ renderPage(‘ambiance’); }); });
});
document.getElementById(‘a-addzone’).addEventListener(‘click’, function() {
var emojis = [‘🕺’,‘🎵’,‘🛋️’,‘🍕’,‘🍸’,‘💃’,‘🚪’,‘🎤’];
var ze = ‘📍’;
openModal(
‘<h3 class="mtitle">🗺️ Zone</h3>’
+ field(‘Nom *’, ‘<input class="inp" id="z-n" placeholder="Ex: Dancefloor, Bar…">’)
+ ‘<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px" id="zemojis">’
+ emojis.map(function(e){ return ‘<button class="emoji-pick" data-e="' + e + '">’ + e + ‘</button>’; }).join(’’)
+ ‘</div>’
+ field(‘Capacité’, ‘<input class="inp" id="z-cap" type="number" placeholder="Nb personnes">’)
+ ‘<button class="btn btn-p w100" id="z-save">💾 Ajouter</button>’
);
document.querySelectorAll(’.emoji-pick’).forEach(function(b) {
b.addEventListener(‘click’, function() {
ze = b.dataset.e;
document.querySelectorAll(’.emoji-pick’).forEach(function(x){ x.classList.remove(‘active’); });
b.classList.add(‘active’);
});
});
document.getElementById(‘z-save’).addEventListener(‘click’, function() {
var n = document.getElementById(‘z-n’).value.trim();
if (!n) { toast(‘Requis’); return; }
var data = {id:genId(),name:n,emoji:ze,capacity:document.getElementById(‘z-cap’).value,type:‘plan’,subtype:‘zone’,eventId:SEL_A_EV};
dbSet(‘ambiance’, data.id, data).then(function(){ toast(‘Zone ajoutée ✓’); closeModal(); renderPage(‘ambiance’); });
});
});
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────

function renderSettings(el) {
var u = window.CURRENT_USER;
var html = ‘<h2 class="ptitle">⚙️ Réglages</h2>’
+ ‘<div class="slbl">Compte</div>’
+ ‘<div class="card" style="margin-bottom:16px">’;

if (u) {
html += ‘<div style="display:flex;gap:14px;align-items:center;margin-bottom:16px">’
+ (u.photoURL ? ‘<img src="'+u.photoURL+'" style="width:56px;height:56px;border-radius:50%;object-fit:cover">’
: ‘<div class="av" style="width:56px;height:56px;font-size:22px">’ + (u.displayName||‘U’)[0] + ‘</div>’)
+ ‘<div><div style="font-size:17px;font-weight:700">’ + (u.displayName||‘Utilisateur’) + ‘</div>’
+ ‘<div style="font-size:13px;opacity:.6">’ + u.email + ‘</div>’
+ ‘<div style="font-size:12px;color:#4ade80;margin-top:3px">✓ Synchronisé Firebase</div></div></div>’
+ ‘<button class="btn btn-d w100" id="s-logout">🚪 Se déconnecter</button>’;
} else {
html += ‘<div style="text-align:center;padding:8px 0 16px">’
+ ‘<div style="font-size:44px;margin-bottom:10px">🔐</div>’
+ ‘<div style="font-size:17px;font-weight:700;margin-bottom:6px">Connecte-toi pour synchroniser</div>’
+ ‘<div style="font-size:13px;opacity:.6;margin-bottom:20px">Tes soirées sur tous tes appareils</div>’
+ ‘<button class="btn btn-p w100" id="s-google">’
+ ‘<svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0">’
+ ‘<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>’
+ ‘<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>’
+ ‘<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>’
+ ‘<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>’
+ ‘</svg> Continuer avec Google</button></div>’;
}
html += ‘</div>’;

html += ‘<div class="slbl">Données</div>’
+ ‘<div class="card" style="margin-bottom:16px">’
+ ‘<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08)">’
+ ‘<button class="btn btn-s w100" id="s-export">📦 Exporter (JSON)</button></div>’
+ ‘<div style="padding:8px 0"><button class="btn btn-d w100" id="s-delall">⚠️ Supprimer tout</button></div>’
+ ‘</div>’
+ ‘<div class="slbl">À propos</div>’
+ ‘<div class="card" style="margin-bottom:40px">’
+ ‘<div class="row-between" style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,.08)"><span style="opacity:.6">Version</span><span style="font-weight:600">1.0.0</span></div>’
+ ‘<div class="row-between" style="padding:6px 0"><span style="opacity:.6">Stockage</span><span style="font-weight:600">’ + (u ? ‘☁️ Firebase’ : ‘📱 Local’) + ‘</span></div>’
+ ‘</div><div class="spacer"></div>’;

el.innerHTML = html;

document.getElementById(‘s-google’) && document.getElementById(‘s-google’).addEventListener(‘click’, function() {
if (!window.FB_REDIRECT) { toast(‘Firebase non chargé’); return; }
toast(‘Redirection vers Google…’);
window.FB_REDIRECT(window.FB_AUTH, window.FB_PROV).catch(function(err){ toast(’Erreur : ’ + err.message); });
});

document.getElementById(‘s-logout’) && document.getElementById(‘s-logout’).addEventListener(‘click’, function() {
if (window.FB_SIGNOUT) window.FB_SIGNOUT(window.FB_AUTH).then(function(){
window.CURRENT_USER = null; updateUserUI(); toast(‘Déconnecté’); renderPage(‘settings’);
});
});

document.getElementById(‘s-export’).addEventListener(‘click’, function() {
Promise.all([‘events’,‘guests’,‘expenses’,‘contributions’,‘ambiance’].map(function(c){ return dbGet(c).then(function(d){ return {col:c,data:d}; }); }))
.then(function(res) {
var obj = { exportedAt: new Date().toISOString(), user: (window.CURRENT_USER && window.CURRENT_USER.email)||‘local’ };
res.forEach(function(r){ obj[r.col] = r.data; });
var a = document.createElement(‘a’);
a.href = URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)], {type:‘application/json’}));
a.download = ‘nightr-’ + Date.now() + ‘.json’;
a.click();
toast(‘Exporté ✓’);
});
});

document.getElementById(‘s-delall’).addEventListener(‘click’, function() {
if (!confirm(‘Supprimer TOUTES tes données ?’)) return;
Promise.all([‘events’,‘guests’,‘expenses’,‘contributions’,‘ambiance’].map(function(c) {
return dbGet(c).then(function(items) {
return Promise.all(items.map(function(i){ return dbDel(c, i.id); }));
});
})).then(function(){ toast(‘Tout supprimé’); renderPage(‘settings’); });
});
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────

function field(label, input) {
return ‘<div class="fld"><label class="lbl">’ + label + ‘</label>’ + input + ‘</div>’;
}

// ─── START ────────────────────────────────────────────────────────────────────

renderPage(‘events’);
</script>
